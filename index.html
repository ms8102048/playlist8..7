<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Git 全能播放器 (三槽清單同步修正版)</title>
  <link rel="icon" href="video-player-icon.jpg" type="image/jpeg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
  <style>
    body { background: #000; color: #fff; margin: 0; padding: 10px; font-family: sans-serif; box-sizing: border-box; }
    #UI { transition: all 0.3s; }
    textarea { width: 100%; height: 80px; background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; padding: 5px; font-size: 14px; }
    #C { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 8px; }
    .slot-group { display: flex; gap: 8px; margin-bottom: 10px; }
    .btn-slot { background: #222; color: #888; border: 1px solid #444; flex: 1; height: 35px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    .btn-slot.active { background: #5a1a5a; color: #f0f; border: 1px solid #8a2a8a; }
    .btn-group { display: flex; gap: 8px; margin-bottom: 10px; }
    button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; flex: 1; height: 40px; font-size: 13px; }
    .btn-num { min-width: 45px; height: 40px; background: #222; color: #fff; border: 1px solid #444; flex: none; }
    .btn-ctrl { background: #444; color: #fff; }
    #BtnRead { background: #1a3a5a; color: #8cf; border: 1px solid #2d5a88; }
    #BtnWrite { background: #1a5a2a; color: #8f8; border: 1px solid #2d884a; }
    #dplayer { width: 100%; min-height: 380px; aspect-ratio: 16/9; background: #000; border-radius: 4px; }
    .dplayer-icons-right { display: flex !important; align-items: center; }
    #AutoNotice { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 128, 0, 0.9); color: white; padding: 10px 20px; border-radius: 20px; z-index: 9999; display: none; font-weight: bold; }
  </style>
</head>
<body>

<div id="AutoNotice">成功</div>

<div class="slot-group">
  <button id="S1" class="btn-slot" onclick="changeSlot(1)">劇 1</button>
  <button id="S2" class="btn-slot" onclick="changeSlot(2)">劇 2</button>
  <button id="S3" class="btn-slot" onclick="changeSlot(3)">劇 3</button>
</div>

<div id="UI">
  <textarea id="L" placeholder="在此貼入清單 (格式: 名稱$網址)"></textarea>
  <div id="C"></div>
</div>

<div class="btn-group">
  <button id="T" class="btn-ctrl">展開/收合</button>
  <button id="BtnRead" class="btn-ctrl">讀取同步進度</button>
  <button id="BtnWrite" class="btn-ctrl">寫入同步進度</button>
</div>

<div id="dplayer"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/dplayer@latest"></script>
<script>
  const d = document, L = d.getElementById("L"), C = d.getElementById("C"), UI = d.getElementById("UI"), T = d.getElementById("T"), NT = d.getElementById("AutoNotice");
  const BtnRead = d.getElementById("BtnRead"), BtnWrite = d.getElementById("BtnWrite");
  let dp = null;
  
  // 初始化核心資料
  let appState = {
    activeSlot: 1,
    slots: {
      1: { list: "", url: "", time: 0 },
      2: { list: "", url: "", time: 0 },
      3: { list: "", url: "", time: 0 }
    }
  };

  const API_URL = "https://script.google.com/macros/s/AKfycbyXpcaYtHeZVPtiOOr6R8PHL1womW9nhJgV9673K4Hgq4aJ_zmn2HYVgLqRaT12kbLi_Q/exec";

  function showNotice(msg) {
    NT.innerText = msg; NT.style.display = 'block';
    setTimeout(() => { NT.style.display = 'none'; }, 1000);
  }

  // 1. 同步當前狀態到 appState 物件與本地緩存
  function syncToLocal() {
    const cur = appState.activeSlot;
    appState.slots[cur].list = L.value;
    if (dp) {
      appState.slots[cur].url = dp.video.dataset.u;
      appState.slots[cur].time = dp.video.currentTime;
    }
    localStorage.setItem("git_player_v3", JSON.stringify(appState));
  }

  // 2. 切換槽位核心邏輯
  function changeSlot(s, isFirstLoad = false) {
    if (!isFirstLoad) syncToLocal(); // 切換前保存舊槽位修改
    
    appState.activeSlot = s;
    d.querySelectorAll('.btn-slot').forEach(b => b.classList.remove('active'));
    d.getElementById('S'+s).classList.add('active');
    
    // 關鍵：先更新清單文字內容
    const targetData = appState.slots[s];
    L.value = targetData.list || "";
    gen(); // 根據清單產生按鈕
    
    // 如果有記錄網址，載入影片
    if (targetData.url) {
      load(targetData.url, targetData.time || 0);
    } else if (dp) {
      dp.pause();
    }
    showNotice(`切換至 劇 ${s}`);
  }

  window.onload = () => {
    const saved = localStorage.getItem("git_player_v3");
    if (saved) { 
      appState = JSON.parse(saved); 
    }
    changeSlot(appState.activeSlot, true);
  };

  // 3. 手動：讀取雲端 (包含三個槽位的清單與進度)
  BtnRead.onclick = () => {
    BtnRead.innerText = "讀取中...";
    const cbName = 'jsonp_' + Date.now();
    const script = d.createElement('script');
    window[cbName] = (data) => {
      if (data && data.list) {
        try {
          const remoteData = JSON.parse(data.list);
          appState = remoteData; // 徹底覆蓋本地物件
          localStorage.setItem("git_player_v3", data.list);
          // 強制切換至記錄中的槽位並刷新 UI
          changeSlot(appState.activeSlot, true);
          showNotice("✅ 雲端同步成功：清單與位置已還原");
        } catch(e) {
          // 容錯舊格式
          appState.slots[appState.activeSlot].list = data.list;
          appState.slots[appState.activeSlot].url = data.url || "";
          appState.slots[appState.activeSlot].time = data.time || 0;
          changeSlot(appState.activeSlot, true);
          showNotice("⚠️ 載入舊版清單");
        }
      }
      delete window[cbName]; d.body.removeChild(script);
      BtnRead.innerText = "讀取同步進度";
    };
    script.src = `${API_URL}?callback=${cbName}&t=${Date.now()}`;
    d.body.appendChild(script);
  };

  // 4. 手動：寫入雲端 (打包所有資料)
  BtnWrite.onclick = () => {
    syncToLocal();
    BtnWrite.innerText = "寫入中...";
    const payload = {
      list: JSON.stringify(appState),
      url: appState.slots[appState.activeSlot].url,
      time: appState.slots[appState.activeSlot].time
    };
    fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
      .then(() => {
        showNotice("💾 雲端存檔成功：包含 3 個槽位");
        BtnWrite.innerText = "寫入同步進度";
      });
  };

  T.onclick = () => UI.style.display = UI.style.display === 'none' ? 'block' : 'none';

  function gen() {
    const lines = L.value.split('\n').filter(l => l.includes('http'));
    C.innerHTML = '';
    lines.forEach((l, i) => {
      const u = l.split('$').pop().trim();
      const b = d.createElement("button");
      b.className = "btn-num"; b.innerText = (i + 1); b.dataset.u = u;
      b.onclick = () => { syncToLocal(); load(u, 0); };
      C.appendChild(b);
    });
    if (dp) hi(dp.video.dataset.u);
  }

  function load(u, t) {
    hi(u);
    const freshUrl = u.includes('?') ? `${u}&v=${Date.now()}` : `${u}?v=${Date.now()}`;
    if (dp) {
      dp.switchVideo({ url: freshUrl, type: 'hls' });
      dp.video.dataset.u = u;
      if (t > 0) dp.seek(t);
      dp.play();
    } else
