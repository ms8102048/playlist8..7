<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Git 播放器v1</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
  <style>
    body { background: #000; color: #fff; margin: 0; padding: 10px; font-family: sans-serif; box-sizing: border-box; }
    #UI { transition: all 0.3s; }
    textarea { width: 100%; height: 80px; background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; padding: 5px; font-size: 14px; margin-bottom: 5px; }
    #C { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 8px; }
    .btn-group { display: flex; gap: 5px; margin-bottom: 10px; }
    button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; flex: 1; height: 40px; font-size: 12px; white-space: nowrap; }
    .btn-num { min-width: 45px; height: 40px; background: #222; color: #fff; border: 1px solid #444; flex: none; }
    .btn-ctrl { background: #444; color: #fff; }
    #BtnRead { background: #1a3a5a; color: #8cf; border: 1px solid #2d5a88; }
    #BtnWrite { background: #1a5a2a; color: #8f8; border: 1px solid #2d884a; }
    #BtnAuto { background: #333; color: #888; border: 1px solid #444; }
    #BtnAuto.on { background: #822; color: #fcc; border: 1px solid #a33; }
    #dplayer { width: 100%; min-height: 380px; aspect-ratio: 16/9; background: #000; border-radius: 4px; }
    #AutoNotice { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 128, 0, 0.9); color: white; padding: 8px 16px; border-radius: 20px; z-index: 9999; display: none; font-size: 14px; }
    .dplayer-icons-right { display: flex !important; align-items: center; }
  </style>
</head>
<body>

<div id="AutoNotice">成功</div>
<div id="UI">
  <textarea id="L" placeholder="格式: 名稱$網址"></textarea>
  <div id="C"></div>
</div>

<div class="btn-group">
  <button id="T" class="btn-ctrl">展開/收合</button>
  <button id="BtnRead" class="btn-ctrl">讀取同步</button>
  <button id="BtnWrite" class="btn-ctrl">寫入同步</button>
  <button id="BtnAuto" class="btn-ctrl">自動同步</button>
</div>

<div id="dplayer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dplayer/1.27.0/DPlayer.min.js"></script>

<script>
  const d = document, L = d.getElementById("L"), C = d.getElementById("C"), UI = d.getElementById("UI"), T = d.getElementById("T"), NT = d.getElementById("AutoNotice");
  const BtnRead = d.getElementById("BtnRead"), BtnWrite = d.getElementById("BtnWrite"), BtnAuto = d.getElementById("BtnAuto");
  let dp = null, isAuto = false;

  const API_URL = "https://script.google.com/macros/s/AKfycbyXpcaYtHeZVPtiOOr6R8PHL1womW9nhJgV9673K4Hgq4aJ_zmn2HYVgLqRaT12kbLi_Q/exec";

  function showNotice(msg) {
    NT.innerText = msg; NT.style.display = 'block';
    setTimeout(() => { NT.style.display = 'none'; }, 1000);
  }

  function toggleAuto(state, syncToCloud = true) {
    isAuto = (state === true || state === "true");
    isAuto ? BtnAuto.classList.add("on") : BtnAuto.classList.remove("on");
    localStorage.setItem("tv_auto", isAuto);
    if (syncToCloud) uploadData(true);
  }

  BtnAuto.onclick = () => toggleAuto(!isAuto);

  function load(u, t) {
    if (!u || u === "null") return;
    hi(u);

    // 強制避開快取
    const freshUrl = u.includes('?') ? `${u}&v=${Date.now()}` : `${u}?v=${Date.now()}`;

    // 如果已經有播放器，直接切換
    if (dp) {
      dp.switchVideo({ url: freshUrl, type: 'hls' });
      dp.video.dataset.u = u;
      setTimeout(() => { if (t > 0) dp.seek(t); dp.play().catch(()=>{}); }, 600);
      return;
    }

    // 第一次載入播放器
    dp = new DPlayer({
      container: d.getElementById('dplayer'),
      autoplay: true,
      hotkey: true,
      video: {
        url: freshUrl,
        type: 'customHls',
        customType: {
          customHls: function (video, player) {
            if (Hls.isSupported()) {
              const hls = new Hls();
              hls.loadSource(video.src);
              hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
              // 針對 Safari 或 某些內建支援 HLS 的環境直接播放
              video.src = video.src;
            }
          }
        }
      }
    });

    dp.video.dataset.u = u;
    setTimeout(() => { if (t > 0) dp.seek(t); }, 800);
    
    // 如果發生載入錯誤，提示用戶
    dp.on('error', function() {
      console.log("DPlayer 載入失敗，嘗試自動刷新...");
    });

    // 建立控制鈕
    setupControls(u);
  }

function setupControls(u) {
    const btnBox = d.createElement('div');
    btnBox.style.cssText = 'display:flex; align-items:center; gap:15px; margin-right:10px;';
    
    const curEp = d.createElement('div');
    curEp.id = "curEp";
    curEp.style.cssText = 'font-size: 16px; color: #0f0; border: 1.5px solid #080; padding: 4px 12px; border-radius: 4px; font-weight: bold; background: rgba(0,0,0,0.3); white-space: nowrap;';

    const createQuickBtn = (text, action) => {
        const btn = d.createElement('div');
        btn.className = 'dplayer-icon';
        btn.style.cssText = 'width:auto; padding:0 10px; display:flex; align-items:center; cursor:pointer;';
        btn.innerHTML = `<div style="font-size:24px; line-height:1; margin-top:3px;">${text}</div>`;
        btn.onclick = (e) => { e.stopPropagation(); action(); };
        return btn;
    };

    btnBox.appendChild(curEp);
    btnBox.appendChild(createQuickBtn('⏪', () => { dp.seek(dp.video.currentTime - 10); }));
    btnBox.appendChild(createQuickBtn('⏩', () => { dp.seek(dp.video.currentTime + 10); }));
    
    // --- 這裡修改跳過片頭的秒數，我先幫你改成 90 秒 ---
    btnBox.appendChild(createQuickBtn('↩️', () => { 
        dp.seek(90); 
        showNotice("已跳至片頭 (90秒)"); 
    }));
    
    btnBox.appendChild(createQuickBtn('⏭️', () => { nextVideo(); }));
    
    const ir = d.querySelector('.dplayer-icons-right');
    if (ir) ir.insertBefore(btnBox, ir.firstChild);
    updateEpDisp(u);
  }  function gen() {
    const lines = L.value.split('\n').filter(l => l.includes('http'));
    C.innerHTML = '';
    lines.forEach((l, i) => {
      const u = l.split('$').pop().trim();
      const b = d.createElement("button");
      b.className = "btn-num"; b.innerText = (i + 1); b.dataset.u = u;
      b.onclick = () => { load(u, 0); if(isAuto) setTimeout(()=>uploadData(true), 1000); };
      C.appendChild(b);
    });
    if (dp) hi(dp.video.dataset.u);
  }

  function fetchCloudData(isInitial = false) {
    if (!isInitial) BtnRead.innerText = "讀取中...";
    const cbName = 'jsonp_' + Date.now();
    const script = d.createElement('script');
    window[cbName] = (data) => {
      if (data && data.list) {
        L.value = data.list;
        localStorage.setItem("tv_l", data.list);
        gen();
        if (data.url) load(data.url, data.time || 0);
        if (data.auto !== undefined) toggleAuto(data.auto, false);
        if (!isInitial) showNotice("✅ 讀取成功");
      }
      delete window[cbName]; d.body.removeChild(script);
      BtnRead.innerText = "讀取同步";
    };
    script.src = `${API_URL}?callback=${cbName}&t=${Date.now()}`;
    d.body.appendChild(script);
  }

  function uploadData(isSilent = false) {
    const payload = {
      list: L.value,
      url: dp ? dp.video.dataset.u : (localStorage.getItem("tv_u") || ""),
      time: dp ? dp.video.currentTime : (localStorage.getItem("tv_last_time") || 0),
      auto: isAuto
    };
    fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
    .then(() => { if (!isSilent) showNotice("💾 寫入成功"); });
  }

  function nextVideo() { 
    const bs = Array.from(d.querySelectorAll(".btn-num"));
    const u = dp ? dp.video.dataset.u : "";
    const i = bs.findIndex(b => b.dataset.u === u);
    if (i !== -1 && i < bs.length - 1) bs[i + 1].click(); 
  }

  function updateEpDisp(u) {
    const bs = Array.from(d.querySelectorAll(".btn-num"));
    const i = bs.findIndex(b => b.dataset.u === u);
    const el = d.getElementById("curEp");
    if (el) el.innerText = i !== -1 ? `第 ${i + 1} 集` : "";
  }

  function hi(u) {
    updateEpDisp(u);
    d.querySelectorAll(".btn-num").forEach(b => {
      const a = b.dataset.u === u;
      b.style.background = a ? "#0f0" : "#222";
      b.style.color = a ? "#000" : "#fff";
    });
  }

  BtnRead.onclick = () => fetchCloudData(false);
  BtnWrite.onclick = () => uploadData(false);
  T.onclick = () => UI.style.display = UI.style.display === 'none' ? 'block' : 'none';
  L.oninput = () => { localStorage.setItem("tv_l", L.value); gen(); };

  window.onload = () => {
    const saved = localStorage.getItem("tv_l");
    if (saved) { L.value = saved; gen(); }
    fetchCloudData(true);
  };
</script>
</body>
</html>
