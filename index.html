<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>穩定原生全螢幕版</title>
  <style>
    body { background: #000; color: #fff; margin: 0; padding: 10px; font-family: sans-serif; }
    #UI { margin-bottom: 10px; }
    textarea { width: 100%; height: 60px; background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 5px; }
    #C { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 8px; }
    .btn-num { min-width: 45px; height: 40px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
    
    /* 核心容器：全螢幕會放大這整個框 */
    .player-container { 
      position: relative; 
      width: 100%; 
      background: #000; 
      aspect-ratio: 16/9; 
      display: flex;
      flex-direction: column;
    }
    
    video { width: 100%; flex-grow: 1; background: #000; cursor: pointer; }

    /* 自定義控制條：浮動在影片下方 */
    .custom-bar {
      display: flex;
      align-items: center;
      padding: 10px 15px;
      gap: 15px;
      background: rgba(20, 20, 20, 0.9);
      border-top: 1px solid #333;
    }

    .ctrl-icon { cursor: pointer; font-size: 26px; user-select: none; }
    #curEp { font-size: 16px; color: #0f0; border: 1.5px solid #080; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    
    /* 隱藏原生控制列，因為我們要用自己的 */
    video::-webkit-media-controls { display:none !important; }
    
    #AutoNotice { 
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 128, 0, 0.9); padding: 8px 20px; border-radius: 20px; z-index: 10000; display: none;
    }
  </style>
</head>
<body>

<div id="AutoNotice">成功</div>

<div id="UI">
  <textarea id="L" placeholder="格式: 名稱$網址"></textarea>
  <div id="C"></div>
  <div style="margin: 10px 0;">
    <button onclick="fetchCloudData()">讀取同步</button>
    <button onclick="uploadData()">寫入同步</button>
  </div>
</div>

<div class="player-container" id="mainPlayer">
  <video id="v" playsinline autoplay onclick="togglePlay()"></video>
  
  <div class="custom-bar">
    <div id="curEp">第 - 集</div>
    <div class="ctrl-icon" onclick="v.currentTime -= 10">⏪</div>
    <div class="ctrl-icon" onclick="v.currentTime += 10">⏩</div>
    <div class="ctrl-icon" onclick="v.currentTime = 85; showNotice('已跳過片頭')">↩️</div>
    <div class="ctrl-icon" onclick="nextVideo()">⏭️</div>
    
    <div style="flex-grow: 1;"></div>
    
    <div class="ctrl-icon" onclick="toggleFullScreen()" style="font-size: 20px;">〔 〕</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<script>
  const d = document, v = d.getElementById("v"), L = d.getElementById("L"), C = d.getElementById("C"), 
        MP = d.getElementById("mainPlayer"), curEpDisp = d.getElementById("curEp"), NT = d.getElementById("AutoNotice");
  let hls = null;

  function showNotice(msg) {
    NT.innerText = msg; NT.style.display = 'block';
    setTimeout(() => { NT.style.display = 'none'; }, 1000);
  }

  function load(u, t) {
    if (!u) return;
    const freshUrl = u.includes('?') ? u + "&v=" + Date.now() : u + "?v=" + Date.now();
    if (hls) hls.destroy();
    if (Hls.isSupported()) {
      hls = new Hls(); hls.loadSource(freshUrl); hls.attachMedia(v);
      hls.on(Hls.Events.MANIFEST_PARSED, () => { if(t>0) v.currentTime = t; v.play(); });
    } else { v.src = freshUrl; }
    v.dataset.u = u;
    updateStatus(u);
  }

  function togglePlay() { if (v.paused) v.play(); else v.pause(); }

  // 關鍵功能：讓「整個容器」進入全螢幕，這樣按鈕才不會不見
  function toggleFullScreen() {
    if (!d.fullscreenElement) {
      MP.requestFullscreen().catch(err => {
        // 針對 iPhone 的特殊處理
        v.webkitEnterFullscreen();
      });
    } else {
      d.exitFullscreen();
    }
  }

  function nextVideo() {
    const bs = Array.from(d.querySelectorAll(".btn-num"));
    const i = bs.findIndex(b => b.dataset.u === v.dataset.u);
    if (i !== -1 && i < bs.length - 1) bs[i + 1].click();
  }

  function gen() {
    const lines = L.value.split('\n').filter(l => l.includes('http'));
    C.innerHTML = '';
    lines.forEach((l, i) => {
      const u = l.split('$').pop().trim();
      const b = d.createElement("button");
      b.className = "btn-num"; b.innerText = (i + 1); b.dataset.u = u;
      b.onclick = () => load(u, 0);
      C.appendChild(b);
    });
  }

  function updateStatus(u) {
    const bs = Array.from(d.querySelectorAll(".btn-num"));
    const i = bs.findIndex(b => b.dataset.u === u);
    curEpDisp.innerText = i !== -1 ? "第 " + (i + 1) + " 集" : "播放中";
  }

  // 同步功能 (維持你的 API 串接)
  const API_URL = "https://script.google.com/macros/s/AKfycbyXpcaYtHeZVPtiOOr6R8PHL1womW9nhJgV9673K4Hgq4aJ_zmn2HYVgLqRaT12kbLi_Q/exec";
  function fetchCloudData() {
    const cbName = 'jsonp_' + Date.now();
    const script = d.createElement('script');
    window[cbName] = (data) => {
      if (data && data.list) { L.value = data.list; gen(); if (data.url) load(data.url, data.time); showNotice("同步成功"); }
      delete window[cbName]; d.body.removeChild(script);
    };
    script.src = API_URL + "?callback=" + cbName;
    d.body.appendChild(script);
  }

  function uploadData() {
    const payload = { list: L.value, url: v.dataset.u || "", time: v.currentTime || 0 };
    fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) }).then(() => showNotice("已存檔"));
  }

  L.oninput = () => { localStorage.setItem("tv_l", L.value); gen(); };
  v.onended = () => nextVideo();

  window.onload = () => {
    const saved = localStorage.getItem("tv_l");
    if (saved) { L.value = saved; gen(); }
    fetchCloudData();
  };

  setInterval(() => {
    if (v.currentTime > 0 && !v.paused) {
      localStorage.setItem("tv_u", v.dataset.u);
      localStorage.setItem("tv_last_time", v.currentTime);
    }
  }, 10000);
</script>
</body>
</html>
