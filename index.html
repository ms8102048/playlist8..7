<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Git播放器-HTML5</title>
  <style>
    body { background: #000; color: #fff; margin: 0; padding: 10px; font-family: sans-serif; box-sizing: border-box; }
    #UI { transition: all 0.3s; margin-bottom: 10px; }
    textarea { width: 100%; height: 80px; background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 5px; font-size: 14px; }
    #C { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 8px; }
    
    .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
    button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; flex: 1; height: 40px; font-size: 13px; }
    .btn-num { min-width: 45px; height: 40px; background: #222; color: #fff; border: 1px solid #444; flex: none; }
    .btn-ctrl { background: #444; color: #fff; }
    #BtnRead { background: #1a3a5a; color: #8cf; border: 1px solid #2d5a88; }
    #BtnWrite { background: #1a5a2a; color: #8f8; border: 1px solid #2d884a; }
    
    /* 播放器容器 */
    .player-container { position: relative; width: 100%; background: #000; }
    video { width: 100%; aspect-ratio: 16/9; display: block; background: #000; border-radius: 4px 4px 0 0; }
    
    /* 自訂控制列 (仿 DPlayer UI) */
    .custom-controls { 
      background: #181818; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 10px; 
      gap: 20px; 
      border-radius: 0 0 4px 4px;
      border: 1px solid #333;
    }
    .ctrl-icon { cursor: pointer; font-size: 26px; user-select: none; }
    #curEp { font-size: 16px; color: #0f0; border: 1.5px solid #080; padding: 4px 12px; border-radius: 4px; font-weight: bold; }

    #AutoNotice { 
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 128, 0, 0.9); color: white; padding: 10px 20px;
      border-radius: 20px; z-index: 9999; display: none; font-weight: bold;
    }
  </style>
</head>
<body>

<div id="AutoNotice">成功</div>

<div id="UI">
  <textarea id="L" placeholder="格式: 名稱$網址"></textarea>
  <div id="C"></div>
</div>

<div class="btn-group">
  <button id="T" class="btn-ctrl">展開/收合</button>
  <button id="BtnRead" class="btn-ctrl">讀取同步</button>
  <button id="BtnWrite" class="btn-ctrl">寫入同步</button>
</div>

<div class="player-container">
  <video id="v" controls playsinline autoplay></video>
  <div class="custom-controls">
    <div id="curEp">第 - 集</div>
    <div class="ctrl-icon" onclick="seek(-10)">⏪</div>
    <div class="ctrl-icon" onclick="seek(10)">⏩</div>
    <div class="ctrl-icon" onclick="skipOP()">↩️</div>
    <div class="ctrl-icon" onclick="nextVideo()">⏭️</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<script>
  const d = document, v = d.getElementById("v"), L = d.getElementById("L"), C = d.getElementById("C"), 
        UI = d.getElementById("UI"), T = d.getElementById("T"), NT = d.getElementById("AutoNotice"),
        curEpDisp = d.getElementById("curEp");
  
  let hls = null;
  const API_URL = "https://script.google.com/macros/s/AKfycbyXpcaYtHeZVPtiOOr6R8PHL1womW9nhJgV9673K4Hgq4aJ_zmn2HYVgLqRaT12kbLi_Q/exec";

  function showNotice(msg) {
    NT.innerText = msg; NT.style.display = 'block';
    setTimeout(() => { NT.style.display = 'none'; }, 1000);
  }

  function load(u, t) {
    if (!u) return;
    hi(u);
    // 防快取
    const freshUrl = u.includes('?') ? `${u}&v=${Date.now()}` : `${u}?v=${Date.now()}`;
    
    if (hls) hls.destroy();

    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(freshUrl);
      hls.attachMedia(v);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        if (t > 0) v.currentTime = t;
        v.play();
      });
    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
      // 支援原生 HLS (如 iOS Safari/Brave)
      v.src = freshUrl;
      v.addEventListener('loadedmetadata', () => {
        if (t > 0) v.currentTime = t;
        v.play();
      });
    }
    v.dataset.u = u;
  }

  function seek(s) { v.currentTime += s; }
  function skipOP() { v.currentTime = 85; showNotice("已跳過片頭 (85秒)"); }

  function nextVideo() {
    const bs = Array.from(d.querySelectorAll(".btn-num"));
    const u = v.dataset.u;
    const i = bs.findIndex(b => b.dataset.u === u);
    if (i !== -1 && i < bs.length - 1) bs[i + 1].click();
  }

  function gen() {
    const lines = L.value.split('\n').filter(l => l.includes('http'));
    C.innerHTML = '';
    lines.forEach((l, i) => {
      const u = l.split('$').pop().trim();
      const b = d.createElement("button");
      b.className = "btn-num"; b.innerText = (i + 1); b.dataset.u = u;
      b.onclick = () => load(u, 0);
      C.appendChild(b);
    });
    if (v.dataset.u) hi(v.dataset.u);
  }

  function hi(u) {
    const bs = Array.from(d.querySelectorAll(".btn-num"));
    const i = bs.findIndex(b => b.dataset.u === u);
    curEpDisp.innerText = i !== -1 ? `第 ${i + 1} 集` : "未播放";
    d.querySelectorAll(".btn-num").forEach(b => {
      const a = b.dataset.u === u;
      b.style.background = a ? "#0f0" : "#222";
      b.style.color = a ? "#000" : "#fff";
    });
  }

  // 同步功能保留
  const BtnRead = d.getElementById("BtnRead"), BtnWrite = d.getElementById("BtnWrite");
  BtnRead.onclick = () => {
    BtnRead.innerText = "讀取中...";
    const cbName = 'jsonp_' + Date.now();
    const script = d.createElement('script');
    window[cbName] = (data) => {
      if (data && data.list) {
        L.value = data.list; localStorage.setItem("tv_l", data.list); gen();
        if (data.url) load(data.url, data.time || 0);
        showNotice("✅ 讀取成功");
      }
      delete window[cbName]; d.body.removeChild(script); BtnRead.innerText = "讀取同步";
    };
    script.src = `${API_URL}?callback=${cbName}&t=${Date.now()}`;
    d.body.appendChild(script);
  };

  BtnWrite.onclick = () => {
    BtnWrite.innerText = "寫入中...";
    const payload = { list: L.value, url: v.dataset.u || "", time: v.currentTime || 0 };
    fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
    .then(() => { showNotice("💾 寫入成功"); BtnWrite.innerText = "寫入同步"; });
  };

  T.onclick = () => UI.style.display = UI.style.display === 'none' ? 'block' : 'none';
  L.oninput = () => { localStorage.setItem("tv_l", L.value); gen(); };
  v.onended = () => nextVideo();

  window.onload = () => {
    const saved = localStorage.getItem("tv_l");
    if (saved) { L.value = saved; gen(); }
    const u = localStorage.getItem("tv_u"), t = localStorage.getItem("tv_last_time");
    if (u) load(u, parseFloat(t));
  };

  setInterval(() => {
    if (v.currentTime > 0 && !v.paused) {
      localStorage.setItem("tv_u", v.dataset.u);
      localStorage.setItem("tv_last_time", v.currentTime);
    }
  }, 10000);
</script>
</body>
</html>
