<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Git終極穩定版</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dplayer/1.27.0/DPlayer.min.css">
  <style>
    body { background: #000; color: #fff; margin: 0; padding: 10px; font-family: sans-serif; box-sizing: border-box; }
    #UI { margin-bottom: 10px; }
    textarea { width: 100%; height: 60px; background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 5px; font-size: 14px; }
    #C { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 8px; }
    .btn-num { min-width: 45px; height: 40px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
    #dplayer { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 4px; }
    
    /* 讓 DPlayer 右側控制列可以塞下更多按鈕 */
    .dplayer-icons-right { display: flex !important; align-items: center; }
    .custom-icon { cursor: pointer; padding: 0 8px; display: flex; align-items: center; }
    #curEp { font-size: 15px; color: #0f0; border: 1px solid #080; padding: 1px 8px; border-radius: 4px; font-weight: bold; margin-right: 5px; white-space: nowrap; }
    
    #AutoNotice { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 128, 0, 0.9); padding: 8px 20px; border-radius: 20px; z-index: 10001; display: none; }
  </style>
</head>
<body>

<div id="AutoNotice">成功</div>

<div id="UI">
  <textarea id="L" placeholder="格式: 名稱$網址"></textarea>
  <div id="C"></div>
  <div style="margin: 10px 0;">
    <button onclick="fetchCloudData()" style="padding: 8px 15px;">讀取同步</button>
    <button onclick="uploadData()" style="padding: 8px 15px;">寫入同步</button>
  </div>
</div>

<div id="dplayer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dplayer/1.27.0/DPlayer.min.js"></script>

<script>
  const d = document, L = d.getElementById("L"), C = d.getElementById("C"), NT = d.getElementById("AutoNotice");
  let dp = null;
  const API_URL = "https://script.google.com/macros/s/AKfycbyXpcaYtHeZVPtiOOr6R8PHL1womW9nhJgV9673K4Hgq4aJ_zmn2HYVgLqRaT12kbLi_Q/exec";

  function showNotice(msg) {
    NT.innerText = msg; NT.style.display = 'block';
    setTimeout(() => { NT.style.display = 'none'; }, 1000);
  }

  function load(u, t) {
    if (!u || u === "null") return;
    
    // 強制避開快取關鍵：時間戳
    const freshUrl = u.includes('?') ? `${u}&v=${Date.now()}` : `${u}?v=${Date.now()}`;

    if (dp) {
      // 核心修復：不只是 switch，而是先暫停並強刷資料
      dp.pause();
      dp.switchVideo({ url: freshUrl, type: 'hls' });
      dp.video.dataset.u = u;
      setTimeout(() => { if (t > 0) dp.seek(t); dp.play().catch(()=>{}); }, 600);
    } else {
      // 第一次初始化
      dp = new DPlayer({
        container: d.getElementById('dplayer'),
        autoplay: true,
        video: { 
            url: freshUrl, 
            type: 'customHls',
            customType: {
                customHls: function (video, player) {
                    const hls = new Hls();
                    hls.loadSource(video.src);
                    hls.attachMedia(video);
                }
            }
        }
      });
      dp.video.dataset.u = u;
      
      // 注入自訂按鈕到 DPlayer 右下角（跟齒輪同一列）
      injectButtons();
      
      setTimeout(() => { if (t > 0) dp.seek(t); }, 800);
      dp.on('ended', () => nextVideo());
    }
    updateUI(u);
  }

  function injectButtons() {
    const rightIcons = d.querySelector('.dplayer-icons-right');
    if (!rightIcons) return;

    const wrap = d.createElement('div');
    wrap.style.cssText = "display:flex; align-items:center; margin-right:10px;";
    wrap.innerHTML = `
      <div id="curEp">第 - 集</div>
      <div class="custom-icon" onclick="dp.seek(dp.video.currentTime - 10)" title="後退10秒" style="font-size:24px;">⏪</div>
      <div class="custom-icon" onclick="dp.seek(dp.video.currentTime + 10)" title="前進10秒" style="font-size:24px;">⏩</div>
      <div class="custom-icon" onclick="dp.video.currentTime = 85; showNotice('已跳過片頭')" title="跳過片頭" style="font-size:24px;">↩️</div>
      <div class="custom-icon" onclick="nextVideo()" title="下一集" style="font-size:24px;">⏭️</div>
    `;
    rightIcons.insertBefore(wrap, rightIcons.firstChild);
  }

  function nextVideo() {
    const bs = Array.from(d.querySelectorAll(".btn-num"));
    const i = bs.findIndex(b => b.dataset.u === dp.video.dataset.u);
    if (i !== -1 && i < bs.length - 1) bs[i + 1].click();
  }

  function gen() {
    const lines = L.value.split('\n').filter(l => l.includes('http'));
    C.innerHTML = '';
    lines.forEach((l, i) => {
      const u = l.split('$').pop().trim();
      const b = d.createElement("button");
      b.className = "btn-num"; b.innerText = (i + 1); b.dataset.u = u;
      b.onclick = () => load(u, 0);
      C.appendChild(b);
    });
    if (dp) updateUI(dp.video.dataset.u);
  }

  function updateUI(u) {
    const bs = Array.from(d.querySelectorAll(".btn-num"));
    const i = bs.findIndex(b => b.dataset.u === u);
    const epEl = d.getElementById("curEp");
    if (epEl) epEl.innerText = i !== -1 ? `第 ${i + 1} 集` : "播放中";
    d.querySelectorAll(".btn-num").forEach(b => {
      b.style.background = b.dataset.u === u ? "#0f0" : "#222";
      b.style.color = b.dataset.u === u ? "#000" : "#fff";
    });
  }

  // 同步邏輯維持不變
  function fetchCloudData() {
    const cbName = 'jsonp_' + Date.now();
    const script = d.createElement('script');
    window[cbName] = (data) => {
      if (data && data.list) { L.value = data.list; gen(); if (data.url) load(data.url, data.time); }
      delete window[cbName]; d.body.removeChild(script);
    };
    script.src = API_URL + "?callback=" + cbName + "&t=" + Date.now();
    d.body.appendChild(script);
  }

  function uploadData() {
    const payload = { list: L.value, url: dp ? dp.video.dataset.u : "", time: dp ? dp.video.currentTime : 0 };
    fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) }).then(() => showNotice("已存檔"));
  }

  L.oninput = () => { localStorage.setItem("tv_l", L.value); gen(); };
  
  window.onload = () => {
    const saved = localStorage.getItem("tv_l");
    if (saved) { L.value = saved; gen(); }
    fetchCloudData();
  };

  setInterval(() => {
    if (dp && dp.video.currentTime > 0 && !dp.video.paused) {
      localStorage.setItem("tv_u", dp.video.dataset.u);
      localStorage.setItem("tv_last_time", dp.video.currentTime);
    }
  }, 10000);
</script>
</body>
</html>
