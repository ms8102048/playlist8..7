<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>穩定原生播放器</title>
  <style>
    body { background: #000; color: #fff; margin: 0; padding: 10px; font-family: sans-serif; box-sizing: border-box; }
    #UI { margin-bottom: 10px; }
    textarea { width: 100%; height: 60px; background: #111; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 5px; font-size: 14px; }
    #C { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 8px; }
    
    .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
    button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; flex: 1; height: 36px; font-size: 13px; }
    .btn-num { min-width: 45px; height: 40px; background: #222; color: #fff; border: 1px solid #444; flex: none; }
    #BtnRead { background: #1a3a5a; color: #8cf; }
    #BtnWrite { background: #1a5a2a; color: #8f8; }
    
    /* 播放器核心區塊 */
    .player-wrap { background: #181818; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
    video { width: 100%; aspect-ratio: 16/9; display: block; background: #000; }
    
    /* 控制列排版 */
    .custom-bar { 
      display: flex; 
      align-items: center; 
      padding: 10px; 
      gap: 15px; 
      background: #181818;
      flex-wrap: wrap; /* 寬度不夠時自動換行，手機好按 */
    }
    
    #curEp { 
      font-size: 16px; color: #0f0; border: 1.5px solid #080; 
      padding: 4px 10px; border-radius: 4px; font-weight: bold; 
    }
    
    .ctrl-icon { cursor: pointer; font-size: 26px; user-select: none; padding: 0 5px; }
    .ctrl-icon:active { transform: scale(0.9); }

    #AutoNotice { 
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 128, 0, 0.9); color: white; padding: 8px 20px;
      border-radius: 20px; z-index: 9999; display: none;
    }
  </style>
</head>
<body>

<div id="AutoNotice">成功</div>

<div id="UI">
  <textarea id="L" placeholder="格式: 名稱$網址"></textarea>
  <div id="C"></div>
</div>

<div class="btn-group">
  <button id="BtnRead">讀取同步</button>
  <button id="BtnWrite">寫入同步</button>
  <button onclick="document.getElementById('UI').style.display='none'">隱藏清單</button>
</div>

<div class="player-wrap">
  <video id="v" controls playsinline autoplay></video>
  <div class="custom-bar">
    <div id="curEp">第 - 集</div>
    <div class="ctrl-icon" onclick="v.currentTime -= 10">⏪</div>
    <div class="ctrl-icon" onclick="v.currentTime += 10">⏩</div>
    <div class="ctrl-icon" onclick="v.currentTime = 85; showNotice('已跳過片頭')">↩️</div>
    <div class="ctrl-icon" onclick="nextVideo()">⏭️</div>
    <div style="font-size:12px; color:#666; margin-left:auto;">Brave Native Mode</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<script>
  const d = document, v = d.getElementById("v"), L = d.getElementById("L"), C = d.getElementById("C"), 
        NT = d.getElementById("AutoNotice"), curEpDisp = d.getElementById("curEp");
  let hls = null;
  const API_URL = "https://script.google.com/macros/s/AKfycbyXpcaYtHeZVPtiOOr6R8PHL1womW9nhJgV9673K4Hgq4aJ_zmn2HYVgLqRaT12kbLi_Q/exec";

  function showNotice(msg) {
    NT.innerText = msg; NT.style.display = 'block';
    setTimeout(() => { NT.style.display = 'none'; }, 1000);
  }

  function load(u, t) {
    if (!u) return;
    const freshUrl = u.includes('?') ? u + "&v=" + Date.now() : u + "?v=" + Date.now();
    if (hls) hls.destroy();
    if (Hls.isSupported()) {
      hls = new Hls(); hls.loadSource(freshUrl); hls.attachMedia(v);
      hls.on(Hls.Events.MANIFEST_PARSED, () => { if(t>0) v.currentTime = t; v.play(); });
    } else { v.src = freshUrl; }
    v.dataset.u = u;
    updateStatus(u);
  }

  function nextVideo() {
    const bs = Array.from(d.querySelectorAll(".btn-num"));
    const i = bs.findIndex(b => b.dataset.u === v.dataset.u);
    if (i !== -1 && i < bs.length - 1) bs[i + 1].click();
  }

  function gen() {
    const lines = L.value.split('\n').filter(l => l.includes('http'));
    C.innerHTML = '';
    lines.forEach((l, i) => {
      const u = l.split('$').pop().trim();
      const b = d.createElement("button");
      b.className = "btn-num"; b.innerText = (i + 1); b.dataset.u = u;
      b.onclick = () => load(u, 0);
      C.appendChild(b);
    });
  }

  function updateStatus(u) {
    const bs = Array.from(d.querySelectorAll(".btn-num"));
    const i = bs.findIndex(b => b.dataset.u === u);
    curEpDisp.innerText = i !== -1 ? "第 " + (i + 1) + " 集" : "播放中";
    d.querySelectorAll(".btn-num").forEach(b => {
      b.style.background = b.dataset.u === u ? "#0f0" : "#222";
      b.style.color = b.dataset.u === u ? "#000" : "#fff";
    });
  }

  // 同步邏輯
  const BtnRead = d.getElementById("BtnRead"), BtnWrite = d.getElementById("BtnWrite");
  BtnRead.onclick = () => {
    const cbName = 'jsonp_' + Date.now();
    const script = d.createElement('script');
    window[cbName] = (data) => {
      if (data && data.list) { L.value = data.list; gen(); if (data.url) load(data.url, data.time); showNotice("讀取成功"); }
      delete window[cbName]; d.body.removeChild(script);
    };
    script.src = API_URL + "?callback=" + cbName;
    d.body.appendChild(script);
  };

  BtnWrite.onclick = () => {
    const payload = { list: L.value, url: v.dataset.u || "", time: v.currentTime || 0 };
    fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
    .then(() => showNotice("同步完成"));
  };

  L.oninput = () => { localStorage.setItem("tv_l", L.value); gen(); };
  v.onended = () => nextVideo();

  window.onload = () => {
    const saved = localStorage.getItem("tv_l");
    if (saved) { L.value = saved; gen(); }
    BtnRead.click(); // 自動讀取一次
  };

  setInterval(() => {
    if (v.currentTime > 0 && !v.paused) {
      localStorage.setItem("tv_u", v.dataset.u);
      localStorage.setItem("tv_last_time", v.currentTime);
    }
  }, 10000);
</script>
</body>
</html>
